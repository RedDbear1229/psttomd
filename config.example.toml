# pst2md 설정 파일 예시
# 이 파일을 ~/.pst2md/config.toml 로 복사한 뒤 수정하세요.
#
# Linux/WSL:  cp config.example.toml ~/.pst2md/config.toml
# Windows:    copy config.example.toml %USERPROFILE%\.pst2md\config.toml

# ── 아카이브 루트 디렉터리 ──────────────────────────────────────────────────
[archive]

# 변환된 Markdown 파일이 저장될 루트 경로.
# ~ 는 홈 디렉터리로 자동 확장됩니다.
#
# CLI 로 설정하려면:
#   pst2md-config set-output ~/mail-archive
#   pst2md --pst archive.pst --out ~/mail-archive --save-out
#
# Linux/WSL 예시:
root = "~/mail-archive"

# Windows 예시 (역슬래시 대신 슬래시 사용):
# root = "C:/Users/YourName/mail-archive"

# 다중 아카이브 지원: archive.roots 에 추가 경로를 나열합니다.
# mailgrep --all-archives 로 모든 아카이브를 한 번에 검색합니다.
# roots = ["~/work-archive", "~/personal-archive"]

# ── PST 파서 백엔드 ────────────────────────────────────────────────────────
# auto     — 플랫폼에 따라 자동 선택 (linux/wsl → pypff, windows → win32com)
# pypff    — libpff-python 직접 파싱 (Linux/WSL, 속도 최고)
# readpst  — readpst CLI 경유 EML 파싱 (pypff 설치 어려울 때 대안)
# win32com — Outlook COM API (Windows Native, Outlook 설치 필수)
pst_backend = "auto"

# ── 외부 도구 경로 ────────────────────────────────────────────────────────
# 도구가 PATH 에 있으면 이름만 지정해도 됩니다.
# 특정 경로를 지정하려면 절대 경로를 사용하세요.
[tools]
fzf     = "fzf"
glow    = "glow"
mdcat   = "mdcat"    # 이미지 인라인 렌더 가능한 마크다운 뷰어 (opt-in, 아래 preview_viewer 참조)
bat     = "bat"
sqlite3 = "sqlite3"
rg      = "rg"       # ripgrep (mailgrep 내부 검색에 사용)

# Windows 경로 예시:
# fzf  = "C:/tools/fzf/fzf.exe"
# glow = "C:/tools/glow/glow.exe"

# ── Windows win32com 전용 설정 ────────────────────────────────────────────
# pst_backend = "win32com" 일 때만 적용됩니다.
[win32com]

# Outlook 프로파일 이름.
# 빈 문자열("")이면 Outlook 기본 프로파일을 사용합니다.
# 여러 프로파일이 있을 때 특정 프로파일을 지정하려면 이름을 입력하세요.
outlook_profile = ""

# ── mailview 뷰어 설정 ────────────────────────────────────────────────────
[mailview]

# fzf 미리보기 창에서 glow 가 사용할 Markdown 색상 테마.
#
# 빈 문자열("")이면 scripts/lib/mocha-glow.json 을 자동으로 사용하고,
# 파일이 없으면 내장 dark 테마로 폴백합니다.
#
# 내장 테마 목록:
#   dark         — 어두운 배경 (기본)
#   light        — 밝은 배경
#   dracula      — Dracula 팔레트
#   tokyo-night  — Tokyo Night 팔레트
#   notty        — 색상 없음 (터미널 기본색)
#
# 커스텀 테마: JSON 파일의 절대 경로를 지정합니다.
#   glow_style = "/home/user/.config/glow/my-theme.json"
#
# 예시:
# glow_style = "dark"
# glow_style = "dracula"
# glow_style = "/home/user/.config/glow/catppuccin-mocha.json"
glow_style = ""

# mailview 시작 시 새 MD 파일이 있으면 인덱스를 자동으로 증분 갱신합니다.
# 비활성화하려면 false 로 설정하세요.
auto_index = true

# fzf 미리보기 뷰어 선택:
#   "glow"  — 기본. 마크다운 렌더링 + 컬러. 이미지는 텍스트 링크로만 표시.
#   "mdcat" — Kitty/WezTerm/iTerm2 그래픽 프로토콜 또는
#             sixel(Windows Terminal 1.22+, xterm+sixel, mlterm) 지원 터미널에서
#             마크다운 내 이미지를 인라인으로 렌더링. 비지원 터미널에서는
#             자리표시자 텍스트만 보임(에러 없이 동작). 원격 fetch 는
#             --local (-l) 로 항상 차단.
#
# 설치:
#   Linux/WSL:  cargo install mdcat  또는  sudo apt install mdcat(신버전 배포판)
#   macOS:      brew install mdcat
#   Windows:    winget install mdcat  또는  cargo install mdcat
#
# Termux 는 sixel/kitty 프로토콜을 지원하지 않아 mdcat 이용 시에도 이미지는
# 보이지 않습니다 — 기본 glow 유지가 권장됩니다.
preview_viewer = "glow"

# ── mailenrich LLM 설정 ───────────────────────────────────────────────────
[llm]

# LLM provider: openai | anthropic | ollama
# Ollama(로컬)는 토큰 불필요, 비용 0. 테스트용으로 권장.
provider = "openai"

# API 엔드포인트
# openai:    https://api.openai.com/v1  (기본값)
# anthropic: https://api.anthropic.com
# ollama:    http://localhost:11434
endpoint = "https://api.openai.com/v1"

# 사용할 모델 이름
# openai:    gpt-4o-mini (권장, 저비용) | gpt-4o
# anthropic: claude-haiku-4-5-20251001 | claude-sonnet-4-6
# ollama:    llama3.1:8b | mistral:7b
model = "gpt-4o-mini"

# API 토큰 (비워두면 환경변수 LLM_TOKEN 을 사용합니다 — 권장)
# 보안 권고: 토큰을 이 파일에 저장할 경우 chmod 600 ~/.pst2md/config.toml
token = ""

# 요청 타임아웃 (초)
timeout = 60

# 실패 시 최대 재시도 횟수 (5xx / 429 / 타임아웃)
max_retries = 3

# 동시 LLM 호출 수 (CPU 코어 × 2 이하 권장)
concurrency = 4

[llm.scope]
# 요약 최대 글자 수
summary_max_chars = 300

# 생성할 의미 태그 최대 개수
tag_max_count = 5

# 관련 문서 링크 최대 개수
related_max_count = 5

# 본문 길이가 이 값(바이트) 미만이면 enrichment 를 건너뜁니다
skip_body_shorter_than = 100

# 처리에서 제외할 폴더 이름 목록 (부분 일치)
skip_folders = ["Junk", "Spam", "Deleted Items"]
